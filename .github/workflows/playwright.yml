name: Playwright

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  fast-lane:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run typecheck
        run: npm run typecheck

      - name: Run smoke coverage
        run: npm run test:smoke

      - name: Run API coverage
        run: npm run test:api

      - name: Run contract coverage
        run: npm run test:contract

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-fast-lane-artifacts
          path: |
            playwright-report/
            reports/
            test-results/

  regression:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run regression suite
        run: npm run test:regression

      - name: Upload regression reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-regression-artifacts
          path: |
            playwright-report/
            reports/
            test-results/

  cross-browser-smoke:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run cross-browser smoke coverage
        run: npx playwright test --config=playwright.matrix.config.ts --project=${{ matrix.browser }} --grep @smoke

      - name: Upload cross-browser reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.browser }}-artifacts
          path: |
            playwright-report/
            reports/
            test-results/
